appId: com.wingman.desktop
productName: WingMan
asar: true

directories:
  output: release

files:
  - dist/**/*
  - package.json

extraResources:
  - from: python/dist/wingman-server
    to: python/wingman-server
    filter:
      - "**/*"

win:
  target:
    - nsis
  artifactName: WingMan-${version}-setup.${ext}
  signAndEditExecutable: false
  verifyUpdateCodeSignature: false
  executableName: WingMan

mac:
  target:
    - dmg
  artifactName: WingMan-${version}.${ext}

linux:
  target:
    - AppImage
  artifactName: WingMan-${version}.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  runAfterFinish: true
  perMachine: false
